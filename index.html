<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOVAN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 25px;
      background: cyan;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
    }

    .section {
      padding: 60px 20px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>NOVAN</h1>
    <p>No encajo en este mundo…</p>

    <a class="btn" href="#store">
      Entrar al mundo de NOVAN
    </a>
  </div>

  <div class="section">
    <h2>“Expreso amor… pero duele.”</h2>
  </div>

  <div id="store" class="section">
    <h2>Tienda NOVAN</h2>
    <p>Poleras · Peluches · Chapitas</p>

    <a class="btn" href="#">
      Ir a la tienda
    </a>
  </div>

</body>
</html>
